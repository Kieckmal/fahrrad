<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08111f"><title>GravelRadar Live</title><style>
:root{--bg:#08111f;--p:#111d31;--line:#2b3d5e;--t:#eef4ff;--m:#9cabc3;--a:#68dca9;--b:#73a9ff;--r:#ff7d89}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% 0,#172d54,#08111f 42%,#050a12);color:var(--t);font:15px/1.45 system-ui,-apple-system,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.wrap{max-width:1300px;margin:auto;padding:14px 14px 80px}.hero,.panel,.stat,.card{border:1px solid #ffffff13;background:linear-gradient(155deg,#14223a,#0c1728);border-radius:18px;box-shadow:0 18px 55px #0005}.hero{padding:24px;margin-top:14px}.hero b{color:var(--a);text-transform:uppercase;letter-spacing:.12em;font-size:12px}.hero h1{font-size:clamp(28px,6vw,48px);line-height:1.05;margin:8px 0}.hero p,.muted{color:var(--m)}.btn{border:1px solid var(--line);background:#172640;color:var(--t);border-radius:12px;padding:11px 13px;font-weight:750}.btn.primary{background:var(--a);color:#07131e;border-color:transparent}.btn:disabled{opacity:.5}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.status{margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#091424}.progress{height:9px;border-radius:99px;background:#08101d;overflow:hidden;margin-top:8px}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--a),var(--b));transition:.25s}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}.stat{padding:15px}.stat strong{display:block;font-size:23px}.stat span{font-size:12px;color:var(--m)}.panel{padding:14px;margin-top:12px}.filters{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:8px}input,select{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);background:#091424;color:var(--t)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.card{overflow:hidden}.visual{height:100px;background:linear-gradient(135deg,#203b66,#12302d);padding:12px;position:relative}.bike{font-size:48px}.fav{position:absolute;right:10px;top:10px;width:38px;height:38px;border:0;border-radius:50%;background:#06101fc9;color:white;font-size:20px}.fav.on{color:var(--r)}.body{padding:15px}.source{font-size:12px;color:var(--b);font-weight:800}.body h3{margin:4px 0}.price{font-size:25px;font-weight:900;margin:10px 0}.link{display:block;text-align:center;text-decoration:none;margin-top:12px}.empty{text-align:center;padding:55px;border:1px dashed var(--line);border-radius:16px;color:var(--m);margin-top:12px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:620px){.grid,.filters{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.hero{padding:18px}}
</style></head><body><main class="wrap"><section class="hero"><b>Keine Beispieldaten</b><h1>Live nach Fahrrädern suchen.</h1><p>Der Render-Dienst prüft Händlerseiten serverseitig und zeigt nur Treffer mit erkanntem Preis, passender Größe und erreichbarer Produktseite.</p><div class="actions"><button class="btn primary" id="search">Jetzt suchen</button><button class="btn" id="force">Ohne Cache neu suchen</button></div><div class="status" id="status"><strong>Bereit</strong><div class="muted">Noch keine Suche durchgeführt.</div><div class="progress"><i style="width:0%"></i></div></div></section><section class="stats" id="stats"></section><section class="panel"><div class="filters"><input id="q" placeholder="Modell, Händler, Schaltung …"><select id="condition"><option value="">Alle Zustände</option><option>Neu</option><option>Vorjahresmodell</option><option>Gebraucht</option><option>Refurbished</option></select><select id="size"><option value="">Alle Größen</option><option>59</option><option>60</option><option>61</option><option>L</option><option>XL</option></select><select id="sort"><option value="price">Preis aufsteigend</option><option value="new">Neueste Prüfung</option></select></div></section><div id="results"><div class="empty"><h3>Noch keine Treffer</h3><p>Drücke oben auf „Jetzt suchen“.</p></div></div></main><script>
const MODELS=["Stevens Vapor 2x12","Rose Backroad AL","Canyon Grail AL","Ridley Kanzo A","Trek Checkpoint ALR 5","BMC URS AL","Orbea Terra","Scott Speedster Gravel","Focus Atlas"],$=s=>document.querySelector(s),eur=n=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n||0),esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));let offers=[],favorites=JSON.parse(localStorage.getItem("gravel-favs")||"{}");function filtered(){let q=$("#q").value.toLowerCase(),a=offers.filter(o=>(!q||[o.model,o.source,o.groupset].join(" ").toLowerCase().includes(q))&&(!$("#condition").value||o.condition===$("#condition").value)&&(!$("#size").value||String(o.size)===$("#size").value));if($("#sort").value==="new")a.sort((x,y)=>String(y.checkedAt).localeCompare(String(x.checkedAt)));else a.sort((x,y)=>x.price-y.price);return a}function render(){let a=filtered(),best=offers.length?Math.min(...offers.map(o=>o.price)):0,sources=new Set(offers.map(o=>o.source)).size;$("#stats").innerHTML=[[offers.length,"Treffer"],[best?eur(best):"–","Bestpreis"],[sources,"Quellen"],[offers.filter(o=>String(o.size)==="60").length,"Größe 60"],[offers.filter(o=>favorites[o.id]).length,"Favoriten"]].map(x=>`<div class=stat><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join("");$("#results").innerHTML=a.length?`<div class=grid>${a.map(o=>`<article class=card><div class=visual><button class="fav ${favorites[o.id]?"on":""}" onclick="fav('${o.id}')">${favorites[o.id]?"♥":"♡"}</button><div class=bike>🚲</div></div><div class=body><div class=source>${esc(o.source)} · ${esc(o.condition)} · Größe ${esc(o.size)}</div><h3>${esc(o.model)}</h3><div class=muted>${esc(o.groupset||"Schaltung nicht erkannt")}<br>Geprüft: ${new Date(o.checkedAt).toLocaleString("de-DE")}</div><div class=price>${eur(o.price)}</div><a class="btn primary link" href="${esc(o.url)}" target=_blank rel=noopener>Angebot öffnen ↗</a></div></article>`).join("")}</div>`:`<div class=empty><h3>Keine Treffer</h3><p>Der Scanner hat aktuell keine passenden, überprüfbaren Angebote gefunden.</p></div>`}window.fav=id=>{favorites[id]=!favorites[id];localStorage.setItem("gravel-favs",JSON.stringify(favorites));render()};function status(t,x,p){$("#status").innerHTML=`<strong>${esc(t)}</strong><div class=muted>${esc(x)}</div><div class=progress><i style="width:${p||0}%"></i></div>`}async function search(force=false){$("#search").disabled=$("#force").disabled=true;status("Suche startet","Render kann nach Ruhezeit 30–60 Sekunden benötigen.",3);try{let r=await fetch("/api/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({models:MODELS,force})});if(!r.ok)throw Error("Start fehlgeschlagen");let j=await r.json();if(j.cached){offers=j.results||[];status("Cache geladen",offers.length+" Treffer",100);render();return}while(true){await new Promise(x=>setTimeout(x,1800));let s=await fetch(`/api/search/${j.jobId}`),job=await s.json();status(job.status==="running"?"Suche läuft":job.status==="done"?"Fertig":"Fehler",`${job.message} · ${job.found||0} Treffer`,job.progress||0);if(job.status==="done"){offers=job.results||[];render();break}if(job.status==="error")throw Error(job.message)}}catch(e){status("Fehler",e.message,0)}finally{$("#search").disabled=$("#force").disabled=false}}$("#search").onclick=()=>search(false);$("#force").onclick=()=>search(true);["q","condition","size","sort"].forEach(id=>$("#"+id).addEventListener(id==="q"?"input":"change",render));render();
</script></body></html>
